appId: com.urterminal.app
productName: URterminal
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierrc,.prettierignore,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{PLAN.md,README.md}'
asarUnpack:
  - resources/**
  - '**/node_modules/@homebridge/node-pty-prebuilt-multiarch/**'
# Code signing is unsigned by default. electron-builder auto-detects the
# CSC_LINK (path/base64/URL to a .pfx) and CSC_KEY_PASSWORD env vars at pack
# time — no config needed. For EV / Azure Trusted Signing add an
# `azureSignOptions:` block here. See README "Code signing".
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-Setup-${arch}.${ext}
portable:
  artifactName: ${productName}-${version}-Portable-${arch}.${ext}
# macOS — build ON a Mac (electron-builder can't cross-compile from Windows).
# The `zip` target is REQUIRED for electron-updater on macOS (dmg can't self-patch).
# Unsigned by default; set CSC_LINK/CSC_KEY_PASSWORD + APPLE_ID* to sign + notarize.
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
# Linux — build ON Linux. AppImage self-updates via electron-updater; deb is for
# apt-based distros (other distros: install the AppImage).
linux:
  category: Development
  icon: build/icon.png
  maintainer: URterminal
  synopsis: Multi-pane AI + shell terminal
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
# Auto-update feed: the NSIS installer checks GitHub Releases on launch and
# patches itself. Publishing uploads the installer + latest.yml to a release
# for the matching version tag (see `npm run publish:win`).
publish:
  provider: github
  owner: abdulmahdi3
  repo: URterminal
  # Publish as a live release (not a draft) so the auto-updater can see it.
  releaseType: release
# node-pty ships as a prebuilt binary matched to the Electron ABI (see
# scripts/setup-natives.mjs); no native compiler is available, so never rebuild.
npmRebuild: false
